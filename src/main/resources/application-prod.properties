# Producción - PostgreSQL (Render)
# Las variables las inyecta Render desde la base de datos vinculada (ver render.yaml)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Los QR de mesas deben apuntar al dominio público, no a localhost.
# Render inyecta RENDER_EXTERNAL_URL (ej. https://sistema-los-patos.onrender.com)
app.base-url=${RENDER_EXTERNAL_URL:http://localhost:8080}

# Pool reducido: el free tier de Render Postgres limita conexiones
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Detrás del proxy de Render: respetar X-Forwarded-* para que las URLs y
# las cookies de sesión se generen como https
server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true
