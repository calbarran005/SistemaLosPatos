spring.application.name=Sistema

# Configuración de base de datos MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/Restaurante?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Configuración de Sesión - 15 minutos
server.servlet.session.timeout=15m
server.servlet.session.cookie.max-age=15m
server.servlet.session.cookie.http-only=true

# URL base para generar QR codes
app.base-url=http://localhost:8080
