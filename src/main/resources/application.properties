spring.application.name=Sistema

# Perfil por defecto: desarrollo local (MySQL/XAMPP).
# En Render se sobreescribe con SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Render inyecta el puerto a usar en la variable PORT
server.port=${PORT:8080}

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Configuración de Sesión - 15 minutos
server.servlet.session.timeout=15m
server.servlet.session.cookie.max-age=15m
server.servlet.session.cookie.http-only=true

# URL base para generar QR codes
app.base-url=${APP_BASE_URL:http://localhost:8080}
