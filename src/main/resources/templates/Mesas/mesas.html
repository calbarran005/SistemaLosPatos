<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section}, 'Gestión de Mesas')}">
<body>
<section x-data="{ 
    openModal: false, 
    editMode: false, 
    openQR: false, 
    qrMesaId: null, 
    qrMesaNum: null,
    qrMesaToken: null,
    current: { id_mesa: null, numero: '', capacidad: '', estado: 'LIBRE' } 
}">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-2xl font-black text-stone-900 tracking-tight">Distribución de Sala</h2>
            <p class="text-stone-500 text-sm font-medium mt-1">Monitorea y configura la disponibilidad de tus mesas.</p>
        </div>
        <button @click="openModal = true; editMode = false; current = { id_mesa: null, numero: '', capacidad: '', estado: 'LIBRE' }"
                class="bg-stone-900 text-white px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-2 hover:bg-stone-800 transition active:scale-95 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Nueva Mesa
        </button>
    </div>

    <!-- Estadísticas rápidas — una sola fila (inline para evitar purga de Tailwind) -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;">
        <!-- Libres -->
        <div style="background:#fff;border:1px solid #e7e5e4;border-radius:18px;box-shadow:0 1px 3px rgba(0,0,0,.05);padding:18px;display:flex;align-items:center;gap:14px;">
            <div style="width:46px;height:46px;border-radius:14px;background:#dcfce7;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#16a34a;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#a8a29e;margin:0;">Libres</p>
                <p style="font-size:28px;font-weight:900;color:#1c1917;line-height:1;margin:2px 0 0;"
                   th:text="${#lists.size(mesas.?[estado.name() == 'LIBRE'])}">0</p>
            </div>
        </div>
        <!-- Ocupadas -->
        <div style="background:#fff;border:1px solid #e7e5e4;border-radius:18px;box-shadow:0 1px 3px rgba(0,0,0,.05);padding:18px;display:flex;align-items:center;gap:14px;">
            <div style="width:46px;height:46px;border-radius:14px;background:#fee2e2;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#dc2626;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </div>
            <div>
                <p style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#a8a29e;margin:0;">Ocupadas</p>
                <p style="font-size:28px;font-weight:900;color:#1c1917;line-height:1;margin:2px 0 0;"
                   th:text="${#lists.size(mesas.?[estado.name() == 'OCUPADA'])}">0</p>
            </div>
        </div>
        <!-- Reservadas -->
        <div style="background:#fff;border:1px solid #e7e5e4;border-radius:18px;box-shadow:0 1px 3px rgba(0,0,0,.05);padding:18px;display:flex;align-items:center;gap:14px;">
            <div style="width:46px;height:46px;border-radius:14px;background:#fef3c7;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#d97706;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#a8a29e;margin:0;">Reservadas</p>
                <p style="font-size:28px;font-weight:900;color:#1c1917;line-height:1;margin:2px 0 0;"
                   th:text="${#lists.size(mesas.?[estado.name() == 'RESERVADA'])}">0</p>
            </div>
        </div>
        <!-- Mantenimiento -->
        <div style="background:#fff;border:1px solid #e7e5e4;border-radius:18px;box-shadow:0 1px 3px rgba(0,0,0,.05);padding:18px;display:flex;align-items:center;gap:14px;">
            <div style="width:46px;height:46px;border-radius:14px;background:#f5f5f4;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#78716c;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </div>
            <div>
                <p style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#a8a29e;margin:0;">Mant.</p>
                <p style="font-size:28px;font-weight:900;color:#1c1917;line-height:1;margin:2px 0 0;"
                   th:text="${#lists.size(mesas.?[estado.name() == 'MANTENIMIENTO'])}">0</p>
            </div>
        </div>
    </div>

    <!-- Grid de mesas — diseño profesional (inline para evitar purga de Tailwind) -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;">
        <div th:each="mesa : ${mesas}"
             style="position:relative;background:#fff;border:1px solid #e7e5e4;border-radius:22px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:box-shadow .2s,transform .2s;"
             onmouseover="this.style.boxShadow='0 12px 28px rgba(0,0,0,.12)';this.style.transform='translateY(-3px)'"
             onmouseout="this.style.boxShadow='0 1px 3px rgba(0,0,0,.06)';this.style.transform='none'">

            <!-- Cabecera oscura estilo login -->
            <div style="position:relative;background:#1c1917;padding:20px 18px 28px;overflow:hidden;">
                <!-- glow decorativo -->
                <div th:with="glow=${mesa.estado.name() == 'LIBRE' ? 'rgba(34,197,94,.25)' : (mesa.estado.name() == 'OCUPADA' ? 'rgba(239,68,68,.25)' : (mesa.estado.name() == 'RESERVADA' ? 'rgba(245,158,11,.25)' : 'rgba(168,162,158,.2)'))}"
                     th:style="|position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;filter:blur(28px);background:${glow};|"></div>

                <!-- Badge de estado -->
                <div style="position:relative;display:flex;justify-content:flex-end;margin-bottom:6px;">
                    <span th:switch="${mesa.estado.name()}"
                          style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;backdrop-filter:blur(4px);">
                        <span th:case="'LIBRE'"         style="background:rgba(34,197,94,.15);color:#4ade80;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;">
                            <span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;"></span>Libre</span>
                        <span th:case="'OCUPADA'"       style="background:rgba(239,68,68,.15);color:#f87171;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;">
                            <span style="width:6px;height:6px;border-radius:50%;background:#f87171;display:inline-block;"></span>Ocupada</span>
                        <span th:case="'RESERVADA'"     style="background:rgba(245,158,11,.15);color:#fbbf24;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;">
                            <span style="width:6px;height:6px;border-radius:50%;background:#fbbf24;display:inline-block;"></span>Reservada</span>
                        <span th:case="'MANTENIMIENTO'" style="background:rgba(168,162,158,.18);color:#d6d3d1;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;">
                            <span style="width:6px;height:6px;border-radius:50%;background:#d6d3d1;display:inline-block;"></span>Mant.</span>
                    </span>
                </div>

                <!-- Etiqueta + número grande -->
                <div style="position:relative;text-align:center;">
                    <p style="font-size:9px;font-weight:800;letter-spacing:.35em;text-transform:uppercase;color:#a8a29e;margin:0;">Mesa</p>
                    <p style="font-size:48px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin:2px 0 0;"
                       th:text="${mesa.numero < 10 ? '0' + mesa.numero : mesa.numero}">01</p>
                </div>
            </div>

            <!-- Disco con ícono superpuesto -->
            <div style="display:flex;justify-content:center;margin-top:-22px;position:relative;z-index:2;">
                <div th:with="disco=${mesa.estado.name() == 'LIBRE' ? '#dcfce7' : (mesa.estado.name() == 'OCUPADA' ? '#fee2e2' : (mesa.estado.name() == 'RESERVADA' ? '#fef3c7' : '#f5f5f4'))}"
                     th:style="|width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.12);background:${disco};|">
                    <!-- LIBRE -->
                    <svg th:if="${mesa.estado.name() == 'LIBRE'}" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#16a34a;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <!-- OCUPADA -->
                    <svg th:if="${mesa.estado.name() == 'OCUPADA'}" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#dc2626;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <!-- RESERVADA -->
                    <svg th:if="${mesa.estado.name() == 'RESERVADA'}" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#d97706;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <!-- MANTENIMIENTO -->
                    <svg th:if="${mesa.estado.name() == 'MANTENIMIENTO'}" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;color:#78716c;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
            </div>

            <!-- Capacidad -->
            <div style="text-align:center;padding:10px 0 16px;">
                <p style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:#78716c;margin:0;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width:13px;height:13px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span th:text="${mesa.capacidad} + ' personas'">4 personas</span>
                </p>
            </div>

            <!-- Botones de acción -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid #f0eeec;">
                <button type="button"
                        th:attr="data-id=${mesa.id_mesa}, data-num=${mesa.numero}, data-token=${mesa.qrToken}"
                        @click="qrMesaId = $el.dataset.id; qrMesaNum = $el.dataset.num; qrMesaToken = $el.dataset.token; openQR = true"
                        style="padding:11px 0;border:none;border-right:1px solid #f0eeec;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;color:#d97706;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;transition:background .15s;"
                        onmouseover="this.style.background='#fffbeb'" onmouseout="this.style.background='transparent'">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width:13px;height:13px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 3.5a.5.5 0 11-1 0 .5.5 0 011 0zm-7 0a.5.5 0 11-1 0 .5.5 0 011 0zm-7 0a.5.5 0 11-1 0 .5.5 0 011 0z"/>
                    </svg>
                    QR
                </button>
                <button type="button"
                        th:attr="data-id=${mesa.id_mesa}, data-num=${mesa.numero}, data-cap=${mesa.capacidad}, data-estado=${mesa.estado}"
                        @click="editMode=true; openModal=true; current={id_mesa:$el.dataset.id, numero:$el.dataset.num, capacidad:$el.dataset.cap, estado:$el.dataset.estado}"
                        style="padding:11px 0;border:none;border-right:1px solid #f0eeec;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#78716c;transition:background .15s;"
                        onmouseover="this.style.background='#f5f5f4'" onmouseout="this.style.background='transparent'">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
                <button type="button"
                        th:attr="data-url=@{/mesas/eliminar/{id}(id=${mesa.id_mesa})}"
                        @click="confirmDelete($el.dataset.url)"
                        style="padding:11px 0;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#f87171;transition:background .15s;"
                        onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='transparent'">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Vacío -->
    <div th:if="${#lists.isEmpty(mesas)}" class="text-center py-20 text-stone-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3" />
        </svg>
        <p class="font-black text-sm uppercase tracking-widest">No hay mesas configuradas</p>
    </div>

    <!-- Modal QR (Compacto y Centrado) -->
    <div x-show="openQR" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div @click="openQR = false" class="absolute inset-0 bg-stone-900/60 backdrop-blur-md"></div>
        <div class="relative bg-white rounded-3xl shadow-2xl border border-stone-200 w-full max-w-sm p-8 z-10 text-center">
            <h3 class="font-black text-xl text-stone-900 mb-1" x-text="'Mesa ' + qrMesaNum"></h3>
            <p class="text-[9px] text-stone-400 font-black uppercase tracking-widest mb-6">Acceso exclusivo para clientes</p>
            
            <div class="bg-stone-50 p-6 rounded-2xl border border-stone-100 mb-6 inline-block shadow-inner">
                <template x-if="qrMesaId">
                    <img :src="'/mesas/' + qrMesaId + '/qr'" class="w-44 h-48 mx-auto rounded-lg shadow-sm bg-white p-2">
                </template>
            </div>

            <div class="space-y-3">
                <a :href="'/mesa/' + qrMesaToken" target="_blank" 
                   class="block w-full py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition shadow-lg shadow-amber-500/20 active:scale-95">
                    Abrir Enlace Local
                </a>
                <button @click="openQR = false" 
                        class="block w-full py-3 bg-stone-100 hover:bg-stone-200 text-stone-600 rounded-xl text-[10px] font-black uppercase tracking-widest transition">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Nueva/Editar Mesa -->
    <div x-show="openModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div @click="openModal = false" class="absolute inset-0 bg-stone-900/60 backdrop-blur-md"></div>
        <div class="relative bg-white rounded-3xl shadow-2xl border border-stone-200 w-full max-w-md p-8 z-10">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-amber-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                </div>
                <h3 class="font-black text-xl text-stone-900 uppercase tracking-tight" x-text="editMode ? 'Editar Mesa' : 'Nueva Mesa'"></h3>
            </div>

            <form th:action="@{/mesas/guardar}" method="post" class="space-y-5" onsubmit="return validarMesa(this)">
                <input type="hidden" name="id_mesa" x-model="current.id_mesa">

                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest text-stone-400 mb-1.5">Número Identificador</label>
                    <input type="number" name="numero" x-model="current.numero" min="1" max="999" required
                           @input="if(current.numero) current.numero = current.numero.toString().slice(0,3)"
                           class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-bold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-400/20 focus:border-amber-400 transition-all">
                </div>

                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest text-stone-400 mb-1.5">Capacidad de Personas</label>
                    <input type="number" name="capacidad" x-model="current.capacidad" min="1" max="999" required
                           @input="if(current.capacidad) current.capacidad = current.capacidad.toString().slice(0,3)"
                           class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-bold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-400/20 focus:border-amber-400 transition-all">
                </div>

                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest text-stone-400 mb-1.5">Estado de Servicio</label>
                    <select name="estado" x-model="current.estado"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-bold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-400/20 focus:border-amber-400 transition-all appearance-none cursor-pointer">
                        <option value="LIBRE">Disponible</option>
                        <option value="OCUPADA">Ocupada</option>
                        <option value="RESERVADA">Reservada</option>
                        <option value="MANTENIMIENTO">Fuera de Servicio</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" @click="openModal = false"
                            class="flex-1 py-3 border border-stone-200 rounded-xl text-[10px] font-black uppercase tracking-widest text-stone-400 hover:bg-stone-50 transition-all">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="flex-[1.5] py-3 bg-stone-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg active:scale-95">
                        Confirmar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        // Toast flotante de error de validación (mismo estilo que el aviso de bienvenida)
        function toastValidacion(msg) {
            Swal.fire({
                toast: true, position: 'top-end', icon: 'error', iconColor: '#ffffff',
                title: `<span style="font-family:monospace;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;">${msg}</span>`,
                showConfirmButton: false, timer: 4000, timerProgressBar: true,
                background: '#ef4444', color: '#ffffff',
                customClass: { popup: 'swal2-popup-custom' }
            });
        }

        // Validación del formulario de mesa
        function validarMesa(form) {
            const numero = form.numero.value.trim();
            const capacidad = form.capacidad.value.trim();
            if (!/^\d{1,3}$/.test(numero)) { toastValidacion('El número de mesa debe tener máximo 3 dígitos'); return false; }
            if (!/^\d{1,3}$/.test(capacidad)) { toastValidacion('La capacidad debe tener máximo 3 dígitos'); return false; }
            return true;
        }

        function confirmDelete(url) {
            Swal.fire({
                title: '¿Eliminar mesa?',
                text: 'Esta acción liberará la mesa y cualquier registro asociado.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#78716c',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar',
                customClass: {
                    popup: 'rounded-3xl',
                    confirmButton: 'rounded-xl font-black py-3 px-5 text-[10px] tracking-widest uppercase',
                    cancelButton: 'rounded-xl font-black py-3 px-5 text-[10px] tracking-widest uppercase'
                }
            }).then((result) => {
                if (result.isConfirmed) window.location.href = url;
            });
        }
    </script>

</section>
</body>
</html>
