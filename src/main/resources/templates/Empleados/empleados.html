<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section}, 'Gestión de Personal')}">
<body>
    <section x-data="{ 
        openModal: false, 
        editMode: false, 
        currentEmpleado: { id_usuario: null, nombre: '', email: '', rolId: null, contrasena: '' } 
    }" @edit-empleado.window="
        editMode = true; 
        openModal = true; 
        currentEmpleado = $event.detail;
    ">
        
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-stone-500 font-medium">Administración de Usuarios y Roles.</p>
            </div>
            <button @click="openModal = true; editMode = false; currentEmpleado = { id_usuario: null, nombre: '', email: '', rolId: null, contrasena: '' }" 
                class="bg-stone-900 text-white px-6 py-4 rounded-xl font-black uppercase tracking-widest text-xs transition-all hover:bg-stone-800 shadow-lg flex items-center gap-2">
                <i class="fas fa-plus"></i>
                Registrar Empleado
            </button>
        </div>

        <!-- Tabla de Empleados -->
        <div class="bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50/50 border-b border-stone-100">
                            <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">ID</th>
                            <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Nombre</th>
                            <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Rol</th>
                            <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Estado</th>
                            <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">MFA</th>
                            <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-stone-100">
                        <tr th:each="emp : ${empleados}" class="hover:bg-stone-50 transition-colors">
                            <td class="px-6 py-4 text-sm font-black text-stone-900" th:text="'#' + ${emp.id_usuario}"></td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="text-sm font-bold text-stone-700" th:text="${emp.nombre}"></span>
                                    <span class="text-[10px] text-stone-400 font-medium" th:text="${emp.email}"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider" 
                                      th:classappend="${emp.rol.nombre == 'ROLE_ADMIN' ? 'bg-amber-100 text-amber-700' : 'bg-stone-100 text-stone-600'}"
                                      th:text="${emp.rol.nombre.replace('ROLE_', '')}">Rol</span>
                            </td>
                            <td class="px-6 py-4">
                                <a th:href="@{/empleados/estado/{id}(id=${emp.id_usuario})}" 
                                   class="flex items-center gap-2 group cursor-pointer">
                                    <div class="h-5 w-10 rounded-full transition-colors relative"
                                         th:classappend="${emp.accountNonLocked ? 'bg-emerald-500' : 'bg-stone-300'}">
                                        <div class="h-3 w-3 bg-white rounded-full absolute top-1 transition-all"
                                             th:classappend="${emp.accountNonLocked ? 'right-1' : 'left-1'}"></div>
                                    </div>
                                    <span class="text-[10px] font-black uppercase tracking-tight"
                                          th:classappend="${emp.accountNonLocked ? 'text-emerald-600' : 'text-stone-400'}"
                                          th:text="${emp.accountNonLocked ? 'Activo' : 'Bloqueado'}"></span>
                                </a>
                            </td>
                            <td class="px-6 py-4">
                                <span th:if="${emp.mfaEnabled}" class="text-emerald-500 flex items-center gap-1.5 font-bold text-xs">
                                    <i class="fas fa-shield-alt"></i>
                                </span>
                                <span th:unless="${emp.mfaEnabled}" class="text-stone-300 flex items-center gap-1.5 font-bold text-xs">
                                    <i class="fas fa-shield-alt"></i>
                                </span>
                            </td>
                            <td class="px-6 py-4 flex gap-2">
                                <button th:attr="onclick=|window.dispatchEvent(new CustomEvent('edit-empleado', { detail: { id_usuario: ${emp.id_usuario}, nombre: '${emp.nombre}', email: '${emp.email}', rolId: ${emp.rol.id_rol} } }))|"
                                    class="h-9 w-9 rounded-lg border border-stone-200 text-stone-400 hover:text-amber-600 hover:border-amber-200 transition-all flex items-center justify-center">
                                    <i class="fas fa-edit text-xs"></i>
                                </button>
                                <a th:href="@{/empleados/eliminar/{id}(id=${emp.id_usuario})}" 
                                   onclick="return confirm('¿Estás seguro de eliminar este empleado?')"
                                   class="h-9 w-9 rounded-lg border border-stone-200 text-stone-400 hover:text-red-600 hover:border-red-200 transition-all flex items-center justify-center">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal de Registro/Edición -->
        <div x-show="openModal" 
             class="fixed inset-0 z-50 flex items-center justify-center p-6" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             x-cloak>
            
            <div @click="openModal = false" class="absolute inset-0 bg-stone-900/80 backdrop-blur-md"></div>
            
            <div class="relative bg-white w-full max-w-lg rounded-[2.5rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.2)] overflow-hidden border border-stone-200"
                 x-show="openModal"
                 x-transition:enter="transition ease-out duration-500 delay-100"
                 x-transition:enter-start="opacity-0 translate-y-8 scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 scale-100">
                
                <div class="bg-stone-900 px-10 py-10 text-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-40 h-40 bg-amber-500/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-4 mb-3">
                            <div class="h-12 w-12 rounded-2xl bg-amber-500 flex items-center justify-center text-stone-900 shadow-lg shadow-amber-500/20">
                                <i class="fas" :class="editMode ? 'fa-user-edit' : 'fa-user-plus'"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl font-black uppercase tracking-widest leading-none" x-text="editMode ? 'Editar Perfil' : 'Nuevo Ingreso'"></h2>
                                <p class="text-[10px] text-amber-500 mt-1 uppercase font-black tracking-[0.3em]">Gestión de Personal Administrativo</p>
                            </div>
                        </div>
                    </div>
                </div>

                <form th:action="@{/empleados/guardar}" method="post" class="p-10 space-y-8 bg-white py-4 px-4" onsubmit="return validarEmpleado(this)">
                    <input type="hidden" name="id_usuario" x-model="currentEmpleado.id_usuario">
                    
                    <div class="grid grid-cols-1 gap-8">
                        <div class="space-y-3">
                            <label class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 ml-1">
                                <i class="fas fa-id-card text-amber-600/60 p-2 "></i> Nombre Completo
                            </label>
                            <input type="text" name="nombre" x-model="currentEmpleado.nombre" required maxlength="40"
                                placeholder="Ej. Juan Pérez"
                                class="w-full bg-stone-50 border border-stone-200 rounded-2xl px-4 py-4 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all placeholder:text-stone-300">
                        </div>

                        <div class="space-y-3">
                            <label class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 ml-1">
                                <i class="fas fa-envelope text-amber-600/60 p-2 "></i> Correo Institucional
                            </label>
                            <input type="email" name="email" x-model="currentEmpleado.email" required maxlength="40"
                                placeholder="nombre@lospatos.com"
                                class="w-full bg-stone-50 border border-stone-200 rounded-2xl px-4 py-4 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all placeholder:text-stone-300">
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-3">
                                <label class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 ml-1">
                                    <i class="fas fa-user-shield text-amber-600/60 p-2 "></i> Rol
                                </label>
                                <select name="rol.id_rol" x-model="currentEmpleado.rolId" required
                                    class="w-full bg-stone-50 border border-stone-200 rounded-2xl px-4 py-4 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all appearance-none">
                                    <option value="" disabled>Seleccionar...</option>
                                    <option th:each="rol : ${roles}" th:value="${rol.id_rol}" th:text="${rol.nombre.replace('ROLE_', '')}"></option>
                                </select>
                            </div>

                            <div class="space-y-3">
                                <label class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 ml-1">
                                    <i class="fas fa-lock text-amber-600/60 p-2 "></i> Contraseña
                                </label>
                                <input type="password" name="contrasena" maxlength="20"
                                    :placeholder="editMode ? '••••••••' : 'Requerido'"
                                    class="w-full bg-stone-50 border border-stone-200 rounded-2xl px-4 py-4 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all placeholder:text-stone-300">
                            </div>
                        </div>
                    </div>

                    <div class="pt-10 flex gap-5 px-4 py-4 space-x-4">
                      <button type="button" @click="openModal = false"
                        class="flex-1 bg-stone-100 text-stone-600 py-4  px-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-stone-200 transition-all active:scale-95 border-2 border-stone-300">
                        Cancelar
                    </button>
                        <button type="submit"
                            class="flex-1 bg-stone-900 text-white py-4 px-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black transition-all shadow-xl shadow-stone-900/20 active:scale-95 flex items-center justify-center gap-2">
                            <span x-text="editMode ? 'Actualizar' : 'Registrar'"></span>
                            <i class="fas fa-chevron-right text-[8px]"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Script para manejar notificaciones y MFA -->
        <script th:inline="javascript">
            // Toast flotante de error de validación (mismo estilo que el aviso de bienvenida)
            function toastValidacion(msg) {
                Swal.fire({
                    toast: true, position: 'top-end', icon: 'error', iconColor: '#ffffff',
                    title: `<span style="font-family:monospace;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;">${msg}</span>`,
                    showConfirmButton: false, timer: 4000, timerProgressBar: true,
                    background: '#ef4444', color: '#ffffff',
                    customClass: { popup: 'swal2-popup-custom' }
                });
            }

            // Validación del formulario de empleado
            function validarEmpleado(form) {
                const nombre = form.nombre.value.trim();
                const email = form.email.value.trim();
                const contrasena = form.contrasena.value;
                if (nombre.length === 0) { toastValidacion('El nombre es obligatorio'); return false; }
                if (nombre.length > 40) { toastValidacion('El nombre no puede superar 40 caracteres'); return false; }
                if (email.length > 40) { toastValidacion('El correo no puede superar 40 caracteres'); return false; }
                if (contrasena.length > 20) { toastValidacion('La contraseña no puede superar 20 caracteres'); return false; }
                return true;
            }

            // Manejo de MFA con SweetAlert2
            const showMFA = /*[[${showMFA}]]*/ false;
            const mensaje = /*[[${mensaje}]]*/ null;
            const errorMsg = /*[[${error}]]*/ null;

            if (showMFA) {
                const qrUrl = /*[[${mfaQrUrl}]]*/ '';
                const secret = /*[[${mfaSecret}]]*/ '';
                const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}`;

                Swal.fire({
                    title: `<div class="flex flex-col items-center gap-2">
                                <div class="h-14 w-14 rounded-2xl bg-amber-500 flex items-center justify-center text-stone-900 shadow-lg mb-2">
                                    <i class="fas fa-shield-alt text-2xl"></i>
                                </div>
                                <span style="font-family: monospace; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; font-size: 1.15rem; line-height: 1.2;">
                                    ${mensaje ? mensaje : 'Configuración MFA'}
                                </span>
                            </div>`,
                    html: `
                        <div class="flex flex-col items-center p-2 text-center">
                            <p style="font-family: monospace; font-size: 10px; font-weight: 900; color: #78716c; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem;">Escanea el código para activar la seguridad 2FA</p>
                            
                            <div style="padding: 1rem; background: #fff; border: 1px solid #e7e5e4; border-radius: 2rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);">
                                <img src="${qrImg}" alt="QR Code" style="width: 180px; height: 180px; border-radius: 1rem;">
                            </div>
                            
                            <div style="width: 100%; margin-top: 2rem; padding: 1.5rem; background: #f9f8f7; border-radius: 1.5rem; border: 1px dashed #d6d3d1;">
                                <p style="font-family: monospace; font-size: 9px; font-weight: 900; color: #a8a29e; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.2em;">Clave de configuración manual</p>
                                <code style="font-family: monospace; font-size: 1.25rem; font-weight: 900; color: #d97706; letter-spacing: 0.2em;">${secret}</code>
                            </div>
                            
                            <div style="margin-top: 1.5rem; display: flex; items-center; gap: 0.5rem; color: #ef4444; font-weight: 900; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span>Guarda esta información, no se mostrará de nuevo</span>
                            </div>
                        </div>
                    `,
                    confirmButtonText: 'HE GUARDADO LA CLAVE',
                    confirmButtonColor: '#1c1917',
                    background: '#ffffff',
                    allowOutsideClick: false,
                    customClass: {
                        popup: 'swal2-popup-custom',
                        confirmButton: 'rounded-2xl font-black py-4 px-8 text-[10px] tracking-[0.2em] shadow-xl'
                    }
                });
            } else if (mensaje) {
                // Solo mostrar mensaje de éxito si no hay MFA que mostrar
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: `<span style="font-family: monospace; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;">${mensaje}</span>`,
                    showConfirmButton: false,
                    timer: 3500,
                    background: '#1c1917',
                    color: '#fff',
                    customClass: { popup: 'swal2-popup-custom' }
                });
            }

            if (errorMsg) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'error',
                    title: `<span style="font-family: monospace; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;">${errorMsg}</span>`,
                    showConfirmButton: false,
                    timer: 3500,
                    background: '#ef4444',
                    color: '#fff',
                    customClass: { popup: 'swal2-popup-custom' }
                });
            }
        </script>
    </section>
</body>
</html>
