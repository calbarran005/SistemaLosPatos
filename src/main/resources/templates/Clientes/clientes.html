<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section}, 'Cartera de Clientes')}">
<body>
<section
    x-data="clientesPage()"
    @edit-natural.window="editMode = true; tipoForm = 'NATURAL'; openModal = true; nat = $event.detail;"
    @edit-juridico.window="editMode = true; tipoForm = 'JURIDICO'; openModal = true; jur = $event.detail;">

    <!-- Encabezado -->
    <div class="mb-8">
        <p class="text-stone-500 font-medium">Gestión unificada de clientes naturales y jurídicos.</p>
    </div>

    <!-- Tarjetas de Estadísticas -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
        <div class="bg-stone-900 rounded-2xl shadow-lg p-6 flex items-center gap-5 relative overflow-hidden">
            <div class="absolute -top-8 -right-8 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl pointer-events-none"></div>
            <div class="h-14 w-14 rounded-2xl bg-amber-500 flex items-center justify-center flex-shrink-0 shadow-lg relative">
                <i class="fas fa-users text-stone-900 text-xl"></i>
            </div>
            <div class="relative">
                <p class="text-[10px] font-black uppercase tracking-[0.25em] text-amber-400 mb-1">Total Clientes</p>
                <p class="text-4xl font-black text-white leading-none"
                   th:text="${#lists.size(naturales) + #lists.size(juridicos)}">0</p>
            </div>
        </div>
        <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6 flex items-center gap-5">
            <div class="h-14 w-14 rounded-2xl bg-stone-900 flex items-center justify-center flex-shrink-0 shadow-lg">
                <i class="fas fa-user text-amber-400 text-xl"></i>
            </div>
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.25em] text-stone-400 mb-1">Personas Naturales</p>
                <p class="text-4xl font-black text-stone-900 leading-none" th:text="${#lists.size(naturales)}">0</p>
            </div>
        </div>
        <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6 flex items-center gap-5">
            <div class="h-14 w-14 rounded-2xl bg-stone-900 flex items-center justify-center flex-shrink-0 shadow-lg">
                <i class="fas fa-building text-amber-400 text-xl"></i>
            </div>
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.25em] text-stone-400 mb-1">Personas Jurídicas</p>
                <p class="text-4xl font-black text-stone-900 leading-none" th:text="${#lists.size(juridicos)}">0</p>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         TABLA ÚNICA — Todos los clientes
    ══════════════════════════════════════════ -->
   <div class="bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden mb-8">

    <!-- Cabecera fila 1: título + buscador + botón único -->
    <div class="px-8 pt-7 pb-6 flex flex-col md:flex-row md:items-center gap-5">
        <div class="flex items-center gap-3.5 flex-1 min-w-0">
            <div class="h-11 w-11 rounded-xl bg-stone-100 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-address-book text-stone-600 text-sm"></i>
            </div>
            <div>
                <h2 class="font-black text-sm uppercase tracking-[0.12em] text-stone-800">Cartera de Clientes</h2>
                <p class="text-[10px] text-stone-400 font-medium mt-1"
                   x-text="`${filtered.length} registro(s)`">0 registros</p>
            </div>
        </div>

        <!-- Buscador -->
        <div class="relative w-full md:w-72">
            <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-300 text-xs pointer-events-none"></i>
            <input type="text" x-model="search" @input="page = 1"
                placeholder="Buscar nombre, DNI, RUC..."
                class="w-full bg-stone-50 border border-stone-200 rounded-xl pl-9 pr-4 py-3 text-sm font-medium text-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300">
        </div>

        <!-- Botón único: abre el modal con selector de tipo -->
        <button @click="abrirNuevo()"
            class="bg-stone-900 text-white px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center justify-center gap-2 hover:bg-stone-800 transition-all shadow-lg active:scale-95 flex-shrink-0 mb-4">
            <i class="fas fa-plus text-amber-400"></i> Nuevo Cliente
        </button>
    </div>

    <!-- Cabecera fila 2: filtro por tipo (segmentado) -->
    <div class="px-8 pb-7 border-b border-stone-100">
        <div class="inline-flex flex-wrap bg-stone-100 rounded-2xl p-1.5 gap-1.5">
            <template x-for="opt in [
                    { v: 'TODOS',    l: 'Todos',     i: 'fa-layer-group' },
                    { v: 'NATURAL',  l: 'Naturales', i: 'fa-user' },
                    { v: 'JURIDICO', l: 'Jurídicos', i: 'fa-building' }]" :key="opt.v">
                <button @click="filtroTipo = opt.v; page = 1"
                        :class="filtroTipo === opt.v ? 'bg-stone-900 text-white shadow-md' : 'text-stone-500 hover:text-stone-900 hover:bg-white/70'"
                        class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-[0.15em] transition-all flex items-center gap-2">
                    <i class="fas text-[11px]" :class="opt.i"></i>
                    <span x-text="opt.l"></span>
                    <span class="px-1.5 py-0.5 rounded-md text-[9px] leading-none"
                          :class="filtroTipo === opt.v ? 'bg-amber-500 text-stone-900' : 'bg-stone-200 text-stone-500'"
                          x-text="opt.v === 'TODOS' ? totalClientes : (opt.v === 'NATURAL' ? totalNaturales : totalJuridicos)"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- Tabla -->
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-stone-100 bg-stone-50/60">
                    <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Tipo</th>
                    <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Documento</th>
                    <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Nombre / Razón Social</th>
                    <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Contacto</th>
                    <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Email</th>
                    <th class="px-6 py-4 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em] text-right">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-stone-100">

                <!-- Estado vacío (sin ningún registro en BD) -->
                <tr th:if="${#lists.isEmpty(naturales) and #lists.isEmpty(juridicos)}">
                    <td colspan="6" class="px-6 py-16 text-center">
                        <div class="flex flex-col items-center gap-3">
                            <i class="fas fa-user-slash text-stone-200 text-4xl"></i>
                            <span class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Sin registros aún</span>
                        </div>
                    </td>
                </tr>

                <!-- Clientes naturales -->
                <tr th:each="n : ${naturales}" x-cloak
                    th:attr="x-show=|pagedUids.includes('N${n.id_cliente}')|"
                    class="hover:bg-amber-50/30 transition-colors">
                    <td class="px-6 py-5">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-blue-50 text-blue-700 text-[9px] font-black uppercase tracking-[0.15em]">
                            <i class="fas fa-user text-[9px]"></i> Natural
                        </span>
                    </td>
                    <td class="px-6 py-5">
                        <span class="inline-flex items-center px-3 py-1.5 rounded-lg bg-stone-100 text-[11px] font-black text-stone-700 tracking-wider"
                              th:text="${n.dni}"></span>
                    </td>
                    <td class="px-6 py-5">
                        <span class="block text-sm font-bold text-stone-800" th:text="${n.nombre + ' ' + n.apellidos}"></span>
                    </td>
                    <td class="px-6 py-5 text-sm text-stone-500 font-medium"
                        th:text="${n.telefono != null && !n.telefono.isEmpty() ? n.telefono : '—'}"></td>
                    <td class="px-6 py-5 text-sm text-stone-500 font-medium"
                        th:text="${n.email != null && !n.email.isEmpty() ? n.email : '—'}"></td>
                    <td class="px-6 py-5">
                        <div class="flex gap-2 justify-end">
                            <button
                                th:attr="onclick=|window.dispatchEvent(new CustomEvent('edit-natural', { detail: { id_cliente: ${n.id_cliente}, nombre: '${n.nombre}', apellidos: '${n.apellidos}', dni: '${n.dni}', telefono: '${n.telefono != null ? n.telefono : ''}', email: '${n.email != null ? n.email : ''}' } }))|"
                                class="h-9 w-9 rounded-lg border border-stone-200 text-stone-400 hover:text-amber-600 hover:border-amber-200 hover:bg-amber-50 transition-all flex items-center justify-center"
                                title="Editar">
                                <i class="fas fa-pen text-xs"></i>
                            </button>
                            <button
                                th:attr="onclick=|confirmarEliminar('/clientes/natural/eliminar/${n.id_cliente}', '${n.nombre} ${n.apellidos}')|"
                                class="h-9 w-9 rounded-lg border border-stone-200 text-stone-400 hover:text-red-600 hover:border-red-200 hover:bg-red-50 transition-all flex items-center justify-center"
                                title="Eliminar">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>

                <!-- Clientes jurídicos -->
                <tr th:each="j : ${juridicos}" x-cloak
                    th:attr="x-show=|pagedUids.includes('J${j.id_cliente}')|"
                    class="hover:bg-amber-50/30 transition-colors">
                    <td class="px-6 py-5">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-amber-50 text-amber-700 text-[9px] font-black uppercase tracking-[0.15em]">
                            <i class="fas fa-building text-[9px]"></i> Jurídico
                        </span>
                    </td>
                    <td class="px-6 py-5">
                        <span class="inline-flex items-center px-3 py-1.5 rounded-lg bg-stone-100 text-[11px] font-black text-stone-700 tracking-wider"
                              th:text="${j.ruc}"></span>
                    </td>
                    <td class="px-6 py-5">
                        <span class="block text-sm font-bold text-stone-800" th:text="${j.razonSocial}"></span>
                        <span class="text-[10px] text-stone-400 font-medium"
                              th:text="${j.representante != null && !j.representante.isEmpty() ? 'Rep. ' + j.representante : ''}"></span>
                    </td>
                    <td class="px-6 py-5 text-sm text-stone-500 font-medium"
                        th:text="${j.telefono != null && !j.telefono.isEmpty() ? j.telefono : '—'}"></td>
                    <td class="px-6 py-5 text-sm text-stone-500 font-medium"
                        th:text="${j.email != null && !j.email.isEmpty() ? j.email : '—'}"></td>
                    <td class="px-6 py-5">
                        <div class="flex gap-2 justify-end">
                            <button
                                th:attr="onclick=|window.dispatchEvent(new CustomEvent('edit-juridico', { detail: { id_cliente: ${j.id_cliente}, razonSocial: '${j.razonSocial}', representante: '${j.representante != null ? j.representante : ''}', ruc: '${j.ruc}', telefono: '${j.telefono != null ? j.telefono : ''}', email: '${j.email != null ? j.email : ''}' } }))|"
                                class="h-9 w-9 rounded-lg border border-stone-200 text-stone-400 hover:text-amber-600 hover:border-amber-200 hover:bg-amber-50 transition-all flex items-center justify-center"
                                title="Editar">
                                <i class="fas fa-pen text-xs"></i>
                            </button>
                            <button
                                th:attr="onclick=|confirmarEliminar('/clientes/juridico/eliminar/${j.id_cliente}', '${j.razonSocial}')|"
                                class="h-9 w-9 rounded-lg border border-stone-200 text-stone-400 hover:text-red-600 hover:border-red-200 hover:bg-red-50 transition-all flex items-center justify-center"
                                title="Eliminar">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Sin resultados con los filtros activos -->
    <div x-show="filtered.length === 0 && (search || filtroTipo !== 'TODOS')" x-cloak
         class="px-6 py-10 text-center border-t border-stone-100">
        <p class="text-[11px] font-black text-stone-400 uppercase tracking-widest">
            Sin resultados<span x-show="search"> para "<span x-text="search"></span>"</span>
        </p>
    </div>

    <!-- Paginación (5 por página) -->
    <div x-show="filtered.length > 0" x-cloak
         class="px-8 py-5 border-t border-stone-100 flex items-center justify-between gap-4">
        <span class="text-[10px] font-black text-stone-400 uppercase tracking-widest"
              x-text="`Página ${page} de ${totalPages} · ${filtered.length} registro(s)`"></span>
        <div class="flex items-center gap-1.5">
            <button @click="page = Math.max(1, page - 1)" :disabled="page <= 1"
                    class="h-9 px-3 rounded-lg border border-stone-200 text-stone-500 hover:bg-stone-50 hover:text-amber-600 transition-all flex items-center text-xs font-black disabled:opacity-40 disabled:pointer-events-none">
                <i class="fas fa-chevron-left text-[10px]"></i>
            </button>
            <template x-for="p in totalPages" :key="p">
                <button @click="page = p"
                        :class="p === page ? 'bg-stone-900 text-white border-stone-900' : 'text-stone-500 hover:bg-stone-50 hover:text-amber-600'"
                        class="h-9 min-w-9 px-3 rounded-lg border border-stone-200 transition-all flex items-center justify-center text-xs font-black"
                        x-text="p"></button>
            </template>
            <button @click="page = Math.min(totalPages, page + 1)" :disabled="page >= totalPages"
                    class="h-9 px-3 rounded-lg border border-stone-200 text-stone-500 hover:bg-stone-50 hover:text-amber-600 transition-all flex items-center text-xs font-black disabled:opacity-40 disabled:pointer-events-none">
                <i class="fas fa-chevron-right text-[10px]"></i>
            </button>
        </div>
    </div>
</div>


    <!-- ══════════════════════════════════════════
         MODAL ÚNICO — Nuevo / Editar cliente
    ══════════════════════════════════════════ -->
    <div x-show="openModal"
         class="fixed inset-0 z-50 flex items-center justify-center p-6"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         x-cloak>

        <div @click="openModal = false" class="absolute inset-0 bg-stone-900/80 backdrop-blur-md"></div>

        <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-stone-200"
             x-show="openModal"
             x-transition:enter="transition ease-out duration-400 delay-75"
             x-transition:enter-start="opacity-0 translate-y-6 scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100">

            <div class="bg-stone-900 px-8 py-7 text-white relative overflow-hidden">
                <div class="absolute -top-8 -right-8 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl pointer-events-none"></div>
                <div class="relative flex items-center gap-4">
                    <div class="h-11 w-11 rounded-2xl bg-amber-500 flex items-center justify-center text-stone-900 shadow-lg">
                        <i class="fas text-base"
                           :class="editMode ? (tipoForm === 'NATURAL' ? 'fa-user-pen' : 'fa-building') : 'fa-user-plus'"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-black uppercase tracking-widest leading-none"
                            x-text="editMode ? (tipoForm === 'NATURAL' ? 'Editar Cliente' : 'Editar Empresa') : 'Nuevo Cliente'"></h2>
                        <p class="text-[9px] text-amber-400 mt-1 uppercase font-black tracking-[0.3em]"
                           x-text="tipoForm === 'NATURAL' ? 'Persona Natural' : 'Persona Jurídica'"></p>
                    </div>
                </div>
            </div>

            <!-- Selector de tipo (solo al crear) -->
            <div x-show="!editMode" class="px-7 pt-6">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 block mb-2 text-center">Tipo de cliente</label>
                <div class="grid grid-cols-2 gap-3 p-4">
                    <button type="button" @click="tipoForm = 'NATURAL'"
                        :class="tipoForm === 'NATURAL' ? 'border-amber-400 bg-amber-50 ring-2 ring-amber-500/20' : 'border-stone-200 bg-stone-50 hover:border-stone-300'"
                        class="rounded-xl border p-4 text-left transition-all active:scale-95">
                        <i class="fas fa-user text-lg mb-2 block"
                           :class="tipoForm === 'NATURAL' ? 'text-amber-600' : 'text-stone-400'"></i>
                        <span class="block text-[11px] font-black uppercase tracking-[0.15em] text-stone-800">Natural</span>
                        <span class="block text-[10px] text-stone-400 font-medium mt-0.5">Persona con DNI</span>
                    </button>
                    <button type="button" @click="tipoForm = 'JURIDICO'"
                        :class="tipoForm === 'JURIDICO' ? 'border-amber-400 bg-amber-50 ring-2 ring-amber-500/20' : 'border-stone-200 bg-stone-50 hover:border-stone-300'"
                        class="rounded-xl border p-4 text-left transition-all active:scale-95">
                        <i class="fas fa-building text-lg mb-2 block"
                           :class="tipoForm === 'JURIDICO' ? 'text-amber-600' : 'text-stone-400'"></i>
                        <span class="block text-[11px] font-black uppercase tracking-[0.15em] text-stone-800">Jurídico</span>
                        <span class="block text-[10px] text-stone-400 font-medium mt-0.5">Empresa con RUC</span>
                    </button>
                </div>
            </div>

            <!-- Formulario NATURAL -->
            <form x-show="tipoForm === 'NATURAL'" th:action="@{/clientes/natural/guardar}" method="post"
                  class="p-7 space-y-4" onsubmit="return validarNatural(this)">
                <input type="hidden" name="id_cliente" x-model="nat.id_cliente">

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Nombre</label>
                        <input type="text" name="nombre" x-model="nat.nombre" maxlength="20" placeholder="Ej. Juan"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Apellidos</label>
                        <input type="text" name="apellidos" x-model="nat.apellidos" maxlength="20" placeholder="Ej. Pérez García"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">DNI <span class="text-red-400">*</span></label>
                    <input type="text" name="dni" x-model="nat.dni" maxlength="8" inputmode="numeric"
                        @input="nat.dni = nat.dni.replace(/[^0-9]/g,'')" placeholder="12345678"
                        class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Teléfono</label>
                        <input type="text" name="telefono" x-model="nat.telefono" maxlength="9" inputmode="numeric"
                            @input="nat.telefono = nat.telefono.replace(/[^0-9]/g,'')" placeholder="987654321"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Email</label>
                        <input type="email" name="email" x-model="nat.email" maxlength="40" placeholder="correo@ejemplo.com"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                </div>

                <div class="flex gap-3 pt-3">
                    <button type="button" @click="openModal = false"
                        class="px-6 py-3.5 bg-stone-100 text-stone-500 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-stone-200 hover:text-stone-700 transition-all active:scale-95 border border-stone-200 flex-shrink-0">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="flex-1 bg-stone-900 text-white py-3.5 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <span x-text="editMode ? 'Actualizar' : 'Registrar'"></span>
                        <i class="fas fa-chevron-right text-[8px] opacity-50"></i>
                    </button>
                </div>
            </form>

            <!-- Formulario JURÍDICO -->
            <form x-show="tipoForm === 'JURIDICO'" th:action="@{/clientes/juridico/guardar}" method="post"
                  class="p-7 space-y-4" onsubmit="return validarJuridico(this)">
                <input type="hidden" name="id_cliente" x-model="jur.id_cliente">

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Razón Social <span class="text-red-400">*</span></label>
                    <input type="text" name="razonSocial" x-model="jur.razonSocial" maxlength="40"
                        placeholder="Ej. Inversiones Agro S.A."
                        class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">RUC <span class="text-red-400">*</span></label>
                        <input type="text" name="ruc" x-model="jur.ruc" maxlength="11" inputmode="numeric"
                            @input="jur.ruc = jur.ruc.replace(/[^0-9]/g,'')" placeholder="20547896321"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Representante</label>
                        <input type="text" name="representante" x-model="jur.representante" maxlength="20" placeholder="Nombre del contacto"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Teléfono</label>
                        <input type="text" name="telefono" x-model="jur.telefono" maxlength="9" inputmode="numeric"
                            @input="jur.telefono = jur.telefono.replace(/[^0-9]/g,'')" placeholder="987654321"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Email</label>
                        <input type="email" name="email" x-model="jur.email" maxlength="40" placeholder="contacto@empresa.com"
                            class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-semibold text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 transition-all placeholder:text-stone-300 placeholder:font-normal">
                    </div>
                </div>

                <div class="flex gap-3 pt-3">
                    <button type="button" @click="openModal = false"
                        class="px-6 py-3.5 bg-stone-100 text-stone-500 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-stone-200 hover:text-stone-700 transition-all active:scale-95 border border-stone-200 flex-shrink-0">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="flex-1 bg-stone-900 text-white py-3.5 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <span x-text="editMode ? 'Actualizar' : 'Registrar'"></span>
                        <i class="fas fa-chevron-right text-[8px] opacity-50"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>


    <!-- Notificaciones -->
    <script th:inline="javascript">
        // Componente Alpine: modal único + filtro por tipo + búsqueda + paginación (5/pág)
        function clientesPage() {
            return {
                openModal: false,
                editMode: false,
                tipoForm: 'NATURAL',
                search: '',
                filtroTipo: 'TODOS',
                page: 1,
                perPage: 5,
                natIdx: /*[[${natIndex}]]*/ [],
                jurIdx: /*[[${jurIndex}]]*/ [],
                nat: { id_cliente: null, nombre: '', apellidos: '', dni: '', telefono: '', email: '' },
                jur: { id_cliente: null, razonSocial: '', representante: '', ruc: '', telefono: '', email: '' },

                abrirNuevo() {
                    this.editMode = false;
                    this.tipoForm = this.filtroTipo === 'JURIDICO' ? 'JURIDICO' : 'NATURAL';
                    this.nat = { id_cliente: null, nombre: '', apellidos: '', dni: '', telefono: '', email: '' };
                    this.jur = { id_cliente: null, razonSocial: '', representante: '', ruc: '', telefono: '', email: '' };
                    this.openModal = true;
                },

                // Índice unificado en el mismo orden en que se renderizan las filas
                get todos() {
                    return [
                        ...this.natIdx.map(i => ({ uid: 'N' + i.id, tipo: 'NATURAL', text: i.text })),
                        ...this.jurIdx.map(i => ({ uid: 'J' + i.id, tipo: 'JURIDICO', text: i.text }))
                    ];
                },
                get totalNaturales() { return this.natIdx.length; },
                get totalJuridicos() { return this.jurIdx.length; },
                get totalClientes() { return this.natIdx.length + this.jurIdx.length; },

                get filtered() {
                    const q = this.search.toLowerCase().trim();
                    return this.todos.filter(i =>
                        (this.filtroTipo === 'TODOS' || i.tipo === this.filtroTipo) &&
                        (!q || i.text.includes(q))
                    );
                },
                get totalPages() {
                    return Math.max(1, Math.ceil(this.filtered.length / this.perPage));
                },
                get pagedUids() {
                    const p = Math.min(this.page, this.totalPages);
                    const start = (p - 1) * this.perPage;
                    return this.filtered.slice(start, start + this.perPage).map(i => i.uid);
                }
            };
        }

        // Toast flotante de error de validación (mismo estilo que el aviso de bienvenida)
        function toastValidacion(msg) {
            Swal.fire({
                toast: true, position: 'top-end', icon: 'error', iconColor: '#ffffff',
                title: `<span style="font-family:monospace;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;">${msg}</span>`,
                showConfirmButton: false, timer: 4000, timerProgressBar: true,
                background: '#ef4444', color: '#ffffff',
                customClass: { popup: 'swal2-popup-custom' }
            });
        }

        // Validación cliente natural
        function validarNatural(form) {
            const nombre = form.nombre.value.trim();
            const apellidos = form.apellidos.value.trim();
            const dni = form.dni.value.trim();
            const telefono = form.telefono.value.trim();
            const email = form.email.value.trim();
            if (nombre.length === 0) { toastValidacion('El nombre es obligatorio'); return false; }
            if (nombre.length > 20) { toastValidacion('El nombre no puede superar 20 caracteres'); return false; }
            if (apellidos.length === 0) { toastValidacion('Los apellidos son obligatorios'); return false; }
            if (apellidos.length > 20) { toastValidacion('Los apellidos no pueden superar 20 caracteres'); return false; }
            if (!/^\d{8}$/.test(dni)) { toastValidacion('El DNI debe tener exactamente 8 dígitos'); return false; }
            if (telefono && !/^9\d{8}$/.test(telefono)) { toastValidacion('El teléfono debe tener 9 dígitos y empezar con 9'); return false; }
            if (email.length > 40) { toastValidacion('El email no puede superar 40 caracteres'); return false; }
            return true;
        }

        // Validación cliente jurídico
        function validarJuridico(form) {
            const razonSocial = form.razonSocial.value.trim();
            const ruc = form.ruc.value.trim();
            const representante = form.representante.value.trim();
            const telefono = form.telefono.value.trim();
            const email = form.email.value.trim();
            if (razonSocial.length === 0) { toastValidacion('La razón social es obligatoria'); return false; }
            if (razonSocial.length > 40) { toastValidacion('La razón social no puede superar 40 caracteres'); return false; }
            if (!/^\d{11}$/.test(ruc)) { toastValidacion('El RUC debe tener exactamente 11 dígitos'); return false; }
            if (representante.length > 20) { toastValidacion('El representante no puede superar 20 caracteres'); return false; }
            if (telefono && !/^9\d{8}$/.test(telefono)) { toastValidacion('El teléfono debe tener 9 dígitos y empezar con 9'); return false; }
            if (email.length > 40) { toastValidacion('El email no puede superar 40 caracteres'); return false; }
            return true;
        }

        const mensaje = /*[[${mensaje}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;

        if (mensaje) {
            Swal.fire({
                toast: true, position: 'top-end', icon: 'success', iconColor: '#f59e0b',
                title: `<span style="font-family:monospace;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;">${mensaje}</span>`,
                showConfirmButton: false, timer: 3500,
                background: '#1c1917', color: '#ffffff',
                customClass: { popup: 'swal2-popup-custom' }
            });
        }

        if (errorMsg) {
            Swal.fire({
                icon: 'error', iconColor: '#ef4444',
                title: '<span style="font-family:monospace;font-weight:900;font-size:0.9rem;text-transform:uppercase;">Dato duplicado</span>',
                html: `<span style="font-family:monospace;font-size:12px;color:#78716c;letter-spacing:0.05em;">${errorMsg}</span>`,
                confirmButtonColor: '#1c1917',
                confirmButtonText: 'ENTENDIDO',
                background: '#ffffff',
                customClass: {
                    popup: 'swal2-popup-custom',
                    confirmButton: 'rounded-xl font-black py-3 px-6 text-[10px] tracking-widest'
                }
            });
        }

        function confirmarEliminar(url, nombre) {
            Swal.fire({
                title: '<span style="font-family:monospace;font-weight:900;font-size:0.9rem;text-transform:uppercase;">¿Eliminar cliente?</span>',
                html: `<span style="font-family:monospace;font-size:11px;color:#78716c;letter-spacing:0.05em;"><strong>${nombre}</strong> será eliminado permanentemente.</span>`,
                icon: 'warning', iconColor: '#ef4444',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#1c1917',
                confirmButtonText: 'SÍ, ELIMINAR',
                cancelButtonText: 'CANCELAR',
                background: '#ffffff',
                customClass: {
                    popup: 'swal2-popup-custom',
                    confirmButton: 'rounded-xl font-black py-3 px-5 text-[10px] tracking-widest',
                    cancelButton: 'rounded-xl font-black py-3 px-5 text-[10px] tracking-widest'
                }
            }).then((result) => {
                if (result.isConfirmed) window.location.href = url;
            });
        }
    </script>

</section>
</body>
</html>
