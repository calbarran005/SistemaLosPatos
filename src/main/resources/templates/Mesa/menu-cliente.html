<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú | Los Patos</title>
    <link th:href="@{/style.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        [x-cloak]  { display: none !important; }
        body       { font-family: ui-monospace, 'Courier New', monospace; background: #f5f5f4; }
        
        .cats-scroll { scrollbar-width: none; }
        .cats-scroll::-webkit-scrollbar { display: none; }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Estilo modal carrito */
        .modal-enter { transition: opacity 0.3s ease-out, transform 0.3s ease-out; }
        .modal-enter-start { opacity: 0; transform: scale(0.95); }
        .modal-enter-end { opacity: 1; transform: scale(1); }
        
        /* Glassmorphism para badges */
        .glass-badge {
            background: rgba(28, 25, 23, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        /* Grid dinámico para cards menos anchos */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }
        @media (min-width: 640px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
    </style>
</head>

<script th:inline="javascript">
    /*<![CDATA[*/
    window._ITEMS = /*[[${items}]]*/    [];
    window._CATS  = /*[[${categorias}]]*/ [];
    window._TOKEN = /*[[${token}]]*/    '';
    window._EXISTING_DETAILS = /*[[${detallesActivos}]]*/ [];
    /*]]>*/
</script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<body x-data="menuApp()" class="antialiased">

<!-- ══════════ HEADER ══════════ -->
<header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
            </div>
            <div>
                <p class="text-[10px] text-stone-400 font-black uppercase tracking-[0.2em] leading-none mb-1">Mesa</p>
                <p class="text-xl font-black text-stone-900 leading-none" th:text="${mesa.numero}">1</p>
            </div>
        </div>

        <div class="hidden sm:block text-center">
            <p class="text-xs font-black text-stone-400 uppercase tracking-widest">Restaurante</p>
            <p class="text-lg font-black text-amber-600 italic leading-none">'Los Patos'</p>
        </div>

        <!-- Botón carrito flotante -->
        <button @click="verCarrito = true" 
                class="group relative flex items-center gap-2 bg-stone-900 hover:bg-black text-white rounded-xl px-4 py-2.5 transition-all active:scale-95 shadow-xl shadow-stone-900/20">
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h12l1 12H4L5 9z" />
                </svg>
                <span x-show="cantidadTotal > 0" x-cloak
                      class="absolute -top-2 -right-2 w-5 h-5 bg-amber-500 text-white text-[10px] font-black rounded-full flex items-center justify-center ring-2 ring-white animate-bounce"
                      x-text="cantidadTotal"></span>
            </div>
            <div class="text-left leading-none">
                <p class="text-[9px] font-black text-stone-400 uppercase tracking-wider group-hover:text-amber-400 transition-colors">Mi Mesa</p>
                <p class="text-sm font-black text-white" x-text="'S/.' + total.toFixed(2)"></p>
            </div>
        </button>
    </div>
</header>

<!-- Banner pedido en curso -->
<div th:if="${pedidoActivo}" 
     class="bg-green-600 text-white text-center py-2 text-[10px] font-black uppercase tracking-[0.3em] z-30 relative">
    Pedido en cocina — Puedes seguir pidiendo
</div>

<!-- ══════════ BUSQUEDA Y CATEGORÍAS ══════════ -->
<div class="bg-stone-50 border-b border-stone-200 sticky top-[65px] sm:top-[66px] z-30 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 space-y-4">
        
        <!-- Input de búsqueda -->
        <div class="relative max-w-2xl mx-auto">
            <span class="pointer-events-none absolute inset-y-0 left-0 w-11 flex items-center justify-center text-stone-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </span>
            <input type="text" x-model="searchTerm"
            
                class="w-full bg-white border border-stone-200 rounded-2xl pl-11 pr-4 py-3 text-sm font-bold text-stone-800 focus:outline-none focus:ring-4 focus:ring-amber-500/10 focus:border-amber-400 transition-all placeholder:text-stone-300 shadow-sm">
        </div>

        <!-- Filtros de categoría -->
        <div class="flex gap-2 overflow-x-auto cats-scroll pb-1">
            <button @click="categoriaActiva = null"
                    :class="categoriaActiva === null 
                        ? 'bg-stone-900 text-white shadow-lg shadow-stone-900/20' 
                        : 'bg-white text-stone-500 border border-stone-200 hover:bg-stone-50'"
                    class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all active:scale-95">
                Todos
            </button>
            <template x-for="cat in categorias" :key="cat.id_categoria">
                <button @click="categoriaActiva = cat.id_categoria"
                        :class="categoriaActiva === cat.id_categoria 
                            ? 'bg-stone-900 text-white shadow-lg shadow-stone-900/20' 
                            : 'bg-white text-stone-500 border border-stone-200 hover:bg-stone-50'"
                        class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all active:scale-95"
                        x-text="cat.nombre">
                </button>
            </template>
        </div>
    </div>
</div>

<!-- ══════════ GRID DE PLATOS ══════════ -->
<main class="max-w-5xl mx-auto px-4 py-8 pb-32">
    <div class="menu-grid">
        <template x-for="item in itemsFiltrados" :key="item.id_item">
            <div x-data="{ imgError: false }"
                 class="bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full">

                <!-- Imagen compacta -->
                <div class="aspect-square relative overflow-hidden flex-shrink-0 bg-stone-100">
                    <img :src="item.imagenUrl" :alt="item.nombre"
                         class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-700 hover:scale-110"
                         x-show="item.imagenUrl && !imgError"
                         @error="imgError = true">

                    <!-- Fallback: iniciales del plato -->
                    <div class="absolute inset-0 flex items-center justify-center"
                         :style="'background:' + colorFondo(item.nombre)"
                         x-show="!item.imagenUrl || imgError">
                        <span class="font-black text-3xl sm:text-4xl tracking-tighter select-none"
                              :style="'color:' + colorTexto(item.nombre)"
                              x-text="iniciales(item.nombre)"></span>
                    </div>

                    <!-- Precio Badge -->
                    <div class="absolute bottom-3 right-3 glass-badge text-white px-3 py-1.5 rounded-2xl text-[11px] font-black shadow-lg">
                        <span class="text-amber-400 mr-0.5">S/</span>
                        <span x-text="Number(item.precioVenta).toFixed(2)"></span>
                    </div>
                </div>

                <!-- Detalles -->
                <div class="p-4 flex flex-col flex-1">
                    <h3 class="font-black text-xs text-stone-900 mb-1 tracking-tight leading-snug line-clamp-2 min-h-[2.5em]" x-text="item.nombre"></h3>
                    
                    <div class="mt-auto pt-3">
                        <!-- x-show en vez de x-if para evitar que Alpine refire el click al recrear el DOM -->
                        <div x-show="getCantidad(item.id_item) === 0">
                            <button @click.stop="agregar(item)"
                                    class="w-full flex items-center justify-center gap-2 bg-stone-100 hover:bg-amber-500 hover:text-white text-stone-600 font-black text-[9px] uppercase tracking-widest py-3 rounded-2xl transition-all active:scale-95">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                                </svg>
                                Añadir
                            </button>
                        </div>

                        <div x-show="getCantidad(item.id_item) > 0" class="flex items-center justify-between bg-stone-900 rounded-2xl p-1">
                            <button @click.stop="quitar(item.id_item)"
                                    class="w-8 h-8 rounded-xl bg-stone-800 hover:bg-stone-700 text-white flex items-center justify-center transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4"/>
                                </svg>
                            </button>
                            <span class="font-black text-white text-xs" x-text="getCantidad(item.id_item)"></span>
                            <button @click.stop="agregar(item)"
                                    class="w-8 h-8 rounded-xl bg-amber-500 hover:bg-amber-400 text-white flex items-center justify-center transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Vacío -->
    <div x-show="itemsFiltrados.length === 0" class="py-20 flex flex-col items-center text-stone-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <p class="font-black text-sm uppercase tracking-widest">No hay platos que coincidan</p>
    </div>
</main>

<!-- ══════════ MODAL CARRITO ══════════ -->
<div x-show="verCarrito" 
     x-cloak 
     class="fixed inset-0 z-50 flex items-center justify-center p-4">
    
    <div class="absolute inset-0 bg-stone-900/60 backdrop-blur-md transition-opacity" 
         @click="verCarrito = false"
         x-show="verCarrito"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"></div>

    <div class="relative bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh]"
         x-show="verCarrito"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4">
        
        <div class="px-8 pt-8 pb-6 flex items-center justify-between border-b border-stone-100">
            <div>
                <h3 class="font-black text-2xl text-stone-900 tracking-tight mt-4">Mi Pedido</h3>
                <p class="text-[10px] text-stone-400 font-black uppercase tracking-[0.2em] mt-1" 
                   x-text="cantidadTotal + ' artículos seleccionados'"></p>
            </div>
            <button @click="verCarrito = false" 
                    class="w-12 h-12 bg-stone-50 hover:bg-stone-100 text-stone-400 hover:text-stone-900 rounded-2xl flex items-center justify-center transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-8 py-6 space-y-4">
            <template x-if="carrito.length === 0">
                <div class="py-12 text-center">
                    <div class="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-stone-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h12l1 12H4L5 9z" />
                        </svg>
                    </div>
                    <p class="font-black text-stone-400 text-sm uppercase tracking-widest">El carrito está vacío</p>
                </div>
            </template>

            <template x-for="item in carrito" :key="item.id_item">
                <div x-data="{ imgError: false }" class="flex items-center gap-4 p-4 bg-stone-50 rounded-[1.5rem] border border-stone-100 group transition-all hover:bg-white hover:shadow-md hover:border-amber-200">
                    <div class="relative w-16 h-16 rounded-2xl overflow-hidden flex-shrink-0 bg-white">
                        <img :src="item.imagenUrl" :alt="item.nombre"
                             class="absolute inset-0 w-full h-full object-cover object-center"
                             x-show="item.imagenUrl && !imgError"
                             @error="imgError = true">
                        <div class="absolute inset-0 flex items-center justify-center"
                             :style="'background:' + colorFondo(item.nombre)"
                             x-show="!item.imagenUrl || imgError">
                            <span class="font-black text-lg tracking-tighter select-none"
                                  :style="'color:' + colorTexto(item.nombre)"
                                  x-text="iniciales(item.nombre)"></span>
                        </div>
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <p class="font-black text-stone-900 text-sm truncate leading-none mb-1" x-text="item.nombre"></p>
                        <p class="text-xs font-bold text-amber-600" x-text="'S/. ' + Number(item.precioVenta).toFixed(2)"></p>
                    </div>

                    <div class="flex items-center gap-3 bg-white px-3 py-2 rounded-2xl shadow-sm border border-stone-100">
                        <button @click="quitar(item.id_item)" class="text-stone-400 hover:text-stone-900 transition-colors font-black text-xl leading-none">−</button>
                        <span class="w-6 text-center font-black text-sm text-stone-900" x-text="item.cantidad"></span>
                        <button @click="agregar(item)" class="text-amber-500 hover:text-amber-600 transition-colors font-black text-xl leading-none">+</button>
                    </div>
                </div>
            </template>
        </div>

        <div class="px-8 pb-14 pt-6 bg-stone-50/50 border-t border-stone-100">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <p class="text-[10px] text-stone-400 font-black uppercase tracking-[0.2em] mb-1">Total a pagar</p>
                    <p class="text-3xl font-black text-stone-900 tracking-tighter" x-text="'S/.' + total.toFixed(2)"></p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-stone-400 font-black uppercase tracking-[0.2em] mb-1">Items</p>
                    <p class="text-lg font-black text-stone-600" x-text="cantidadTotal"></p>
                </div>
            </div>

            <button @click="enviarPedido()" 
                    :disabled="carrito.length === 0 || enviando"
                    class="mb-4 w-full py-5 rounded-[2.5rem] font-black text-base tracking-widest uppercase transition-all active:scale-95 shadow-xl disabled:opacity-50 disabled:shadow-none disabled:active:scale-100"
                    :class="carrito.length > 0 && !enviando ? 'bg-amber-500 hover:bg-amber-600 text-white shadow-amber-500/30' : 'bg-stone-200 text-stone-400 cursor-not-allowed'">
                <span x-show="!enviando" class="flex items-center justify-center gap-3">
                    <span x-text="window._EXISTING_DETAILS?.length > 0 ? 'Actualizar Pedido' : 'Confirmar Pedido'"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </span>
                <span x-show="enviando" class="flex items-center justify-center gap-3">
                    <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                    Procesando...
                </span>
            </button>
        </div>
    </div>
</div>

<script>
function menuApp() {
    return {
        categorias: [],
        todosItems: [],
        categoriaActiva: null,
        searchTerm: '',
        carrito: [],
        verCarrito: false,
        enviando: false,

        init() {
            this.todosItems = window._ITEMS || [];
            this.categorias = window._CATS  || [];

            // Pre-cargar pedido activo en el carrito (forzando Number para evitar
            // fallos de comparación === entre proxies reactivos de Alpine.js)
            if (window._EXISTING_DETAILS && window._EXISTING_DETAILS.length > 0) {
                window._EXISTING_DETAILS.forEach(d => {
                    const pb = d.platoBebida || {};
                    this.carrito.push({
                        id_item:    Number(pb.id_item),
                        nombre:     pb.nombre || '',
                        precioVenta: Number(pb.precioVenta || 0),
                        imagenUrl:  pb.imagenUrl || '',
                        cantidad:   Number(d.cantidad || 1),
                        subtotal:   Number(d.subtotal  || 0)
                    });
                });
            }
        },

        // Iniciales del plato (hasta 2 letras) para cuando no hay imagen
        iniciales(nombre) {
            const palabras = (nombre || '')
                .trim()
                .split(/\s+/)
                .filter(p => /^[a-záéíóúüñ]/i.test(p))
                .filter(p => !/^(de|del|la|las|el|los|y|a|al|con|en)$/i.test(p));
            if (palabras.length === 0) return (nombre || '?').trim()[0]?.toUpperCase() || '?';
            return palabras.slice(0, 2).map(p => p[0]).join('').toUpperCase();
        },

        // Tono estable derivado del nombre para que cada plato sin foto se vea distinto
        _hue(nombre) {
            const s = nombre || '';
            let h = 0;
            for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360;
            return h;
        },
        colorFondo(nombre) { return `hsl(${this._hue(nombre)}, 45%, 92%)`; },
        colorTexto(nombre) { return `hsl(${this._hue(nombre)}, 55%, 38%)`; },

        get itemsFiltrados() {
            let filtered = this.todosItems || [];
            if (this.categoriaActiva !== null) {
                filtered = filtered.filter(i => i.categoria && i.categoria.id_categoria === this.categoriaActiva);
            }
            const s = (this.searchTerm || '').trim().toLowerCase();
            if (s !== '') {
                filtered = filtered.filter(i => 
                    (i.nombre || '').toLowerCase().includes(s) || 
                    (i.descripcion || '').toLowerCase().includes(s)
                );
            }
            return filtered;
        },

        agregar(item) {
            const id = Number(item.id_item);
            // Guard 100 ms para descartar doble disparo de eventos
            if (this._ultimoAgregado === id && Date.now() - this._tsAgregado < 100) return;
            this._ultimoAgregado = id;
            this._tsAgregado = Date.now();

            const f = this.carrito.find(i => Number(i.id_item) === id);
            if (f) {
                f.cantidad++;
                f.subtotal = Number(f.precioVenta) * f.cantidad;
            } else {
                this.carrito.push({
                    id_item:     id,
                    nombre:      item.nombre      || '',
                    precioVenta: Number(item.precioVenta || 0),
                    imagenUrl:   item.imagenUrl    || '',
                    cantidad:    1,
                    subtotal:    Number(item.precioVenta || 0)
                });
            }
        },

        quitar(rawId) {
            const id = Number(rawId);
            const idx = this.carrito.findIndex(i => Number(i.id_item) === id);
            if (idx === -1) return;
            if (this.carrito[idx].cantidad > 1) {
                this.carrito[idx].cantidad--;
                this.carrito[idx].subtotal = Number(this.carrito[idx].precioVenta) * this.carrito[idx].cantidad;
            } else {
                this.carrito.splice(idx, 1);
            }
        },

        getCantidad(rawId) {
            const id = Number(rawId);
            const f = this.carrito.find(i => Number(i.id_item) === id);
            return f ? f.cantidad : 0;
        },
        get total() { return this.carrito.reduce((s,i) => s + (i.subtotal || 0), 0); },
        get cantidadTotal() { return this.carrito.reduce((s,i) => s + (i.cantidad || 0), 0); },

        async enviarPedido() {
            if (!this.carrito.length || this.enviando) return;
            this.enviando = true;
            try {
                const resp = await fetch('/mesa/' + window._TOKEN + '/pedido', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: this.carrito.map(i => ({ itemId: i.id_item, cantidad: i.cantidad })) })
                });
                if (resp.ok) window.location.href = '/mesa/' + window._TOKEN + '/estado';
                else alert('Error al enviar pedido');
            } catch(e) { alert('Error de conexión'); }
            finally { this.enviando = false; }
        }
    };
}
</script>
</body>
</html>
